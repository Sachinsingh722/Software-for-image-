<!DOCTYPE html>
<html>
<head>
  <title>Image Layout Tool</title>
  <style>
    body { text-align:center; font-family: Arial; }
    canvas { border:1px solid black; margin-top:20px; }
  </style>
</head>
<body>

<h2>Image Layout Generator</h2>

<input type="file" id="ref" accept="image/*"><br><br>
<input type="file" id="prod" accept="image/*"><br><br>

<button onclick="generate()">Generate Image</button>

<br><canvas id="canvas" width="500" height="500"></canvas>

<script>
function generate() {
  const ref = document.getElementById('ref').files[0];
  const prod = document.getElementById('prod').files[0];

  if (!ref || !prod) {
    alert("Upload both images");
    return;
  }

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const refImg = new Image();
  const prodImg = new Image();

  refImg.src = URL.createObjectURL(ref);
  prodImg.src = URL.createObjectURL(prod);

  refImg.onload = () => {
    ctx.drawImage(refImg, 0, 0, 500, 500);

    prodImg.onload = () => {
      // Adjust position & size here
      ctx.drawImage(prodImg, 150, 150, 200, 200);
    }
  }
}
</script>

</body>
</html>
